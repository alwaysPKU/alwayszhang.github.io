<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图文交错自回归生成模拟器</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 4px rgba(139,92,246,0.4); } 50% { box-shadow: 0 0 12px rgba(139,92,246,0.8); } }
@keyframes decode-flash { 0% { opacity: 0; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
@keyframes slide-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.pulse-glow { animation: pulse-glow 1.2s ease-in-out infinite; }
.decode-flash { animation: decode-flash 0.5s ease-out; }
.slide-in { animation: slide-in 0.2s ease-out; }
.token-enter { animation: slide-in 0.15s ease-out; }
</style>
</head>
<body class="bg-[#0f0f14] text-gray-200 min-h-screen font-sans">
<div class="max-w-5xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-white mb-2">图文交错自回归生成模拟器</h1>
    <p class="text-gray-400 text-sm">模拟 Transformer 如何以自回归方式生成混合 Token 流，并通过分流器实时解包为文本与图像</p>
  </div>

  <!-- Controls -->
  <div class="flex items-center justify-center gap-3 mb-6">
    <button id="btn-prev" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium transition-colors disabled:opacity-40">上一步</button>
    <button id="btn-next" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition-colors disabled:opacity-40">下一步</button>
    <button id="btn-play" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium transition-colors">自动播放</button>
    <button id="btn-reset" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium transition-colors">重置</button>
    <div class="flex items-center gap-2 ml-2">
      <span class="text-xs text-gray-500">速度</span>
      <select id="speed-select" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs">
        <option value="1200">0.5x</option>
        <option value="700" selected>1x</option>
        <option value="400">2x</option>
        <option value="200">4x</option>
      </select>
    </div>
  </div>

  <!-- Progress -->
  <div class="mb-6">
    <div class="flex items-center justify-between text-xs text-gray-500 mb-1">
      <span id="step-label">步骤 0 / 0</span>
      <span id="phase-label" class="text-indigo-400">就绪</span>
    </div>
    <div class="w-full bg-gray-800 rounded-full h-1.5">
      <div id="progress-bar" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
    <!-- Token Stream -->
    <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-4">
      <h3 class="text-sm font-semibold text-gray-400 mb-3 flex items-center gap-2">
        <span class="w-2 h-2 bg-indigo-500 rounded-full"></span>Transformer 输出（Token 流）
      </h3>
      <div id="token-stream" class="flex flex-wrap gap-1.5 min-h-[80px] items-start content-start"></div>
    </div>

    <!-- Router Stats -->
    <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-4">
      <h3 class="text-sm font-semibold text-gray-400 mb-3 flex items-center gap-2">
        <span class="w-2 h-2 bg-amber-500 rounded-full"></span>分流器（Router）
      </h3>
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-blue-500/10 border border-blue-500/20 rounded-lg p-3 text-center">
          <div id="text-count" class="text-2xl font-bold text-blue-400">0</div>
          <div class="text-xs text-blue-300/70 mt-1">文本 Token</div>
        </div>
        <div class="bg-purple-500/10 border border-purple-500/20 rounded-lg p-3 text-center">
          <div id="ctrl-count" class="text-2xl font-bold text-purple-400">0</div>
          <div class="text-xs text-purple-300/70 mt-1">控制 Token</div>
        </div>
        <div class="bg-green-500/10 border border-green-500/20 rounded-lg p-3 text-center">
          <div id="img-count" class="text-2xl font-bold text-green-400">0</div>
          <div class="text-xs text-green-300/70 mt-1">图像 Token</div>
        </div>
      </div>
      <div id="router-status" class="mt-3 text-xs text-gray-500 text-center">等待生成开始...</div>
    </div>
  </div>

  <!-- Output Panels -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
    <!-- Text Stream Output -->
    <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-4">
      <h3 class="text-sm font-semibold text-gray-400 mb-3 flex items-center gap-2">
        <span class="w-2 h-2 bg-blue-500 rounded-full"></span>文本流式输出
      </h3>
      <div id="text-output" class="bg-[#1a1a2e] rounded-lg p-4 min-h-[100px] text-white leading-relaxed font-serif text-base"></div>
    </div>

    <!-- Image Buffer -->
    <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-4">
      <h3 class="text-sm font-semibold text-gray-400 mb-3 flex items-center gap-2">
        <span class="w-2 h-2 bg-green-500 rounded-full"></span>图像缓冲区 &amp; VQ-VAE 解码
      </h3>
      <div id="image-buffer" class="bg-[#1a1a2e] rounded-lg p-4 min-h-[100px] flex items-center justify-center">
        <span class="text-gray-600 text-sm">等待图像 Token...</span>
      </div>
      <div id="decode-status" class="mt-2 text-xs text-gray-600 text-center"></div>
    </div>
  </div>

  <!-- Final Rendered Output -->
  <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-4 mb-6">
    <h3 class="text-sm font-semibold text-gray-400 mb-3 flex items-center gap-2">
      <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>最终渲染输出（图文交错排版）
    </h3>
    <div id="final-output" class="bg-white rounded-lg p-6 min-h-[120px] text-gray-900 leading-relaxed">
      <span class="text-gray-400 text-sm">等待生成完成...</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="flex flex-wrap items-center justify-center gap-4 text-xs text-gray-500">
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 bg-blue-500/30 border border-blue-500/50 rounded"></span>文本 Token</div>
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 bg-purple-500/30 border border-purple-500/50 rounded"></span>控制 Token</div>
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 bg-green-500/30 border border-green-500/50 rounded"></span>图像 Token</div>
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 bg-amber-500/30 border border-amber-500/50 rounded"></span>分流器</div>
  </div>
</div>

<script>
const TOKENS = [
  { type: 'text', value: '很久' }, { type: 'text', value: '很久' }, { type: 'text', value: '以前' },
  { type: 'text', value: '，' }, { type: 'text', value: '有' }, { type: 'text', value: '一只' },
  { type: 'text', value: '可爱' }, { type: 'text', value: '的' }, { type: 'text', value: '猫咪' },
  { type: 'text', value: '。' },
  { type: 'ctrl', value: '<img_start>' },
  { type: 'img', value: '[IMG_102]' }, { type: 'img', value: '[IMG_55]' }, { type: 'img', value: '[IMG_3201]' },
  { type: 'img', value: '[IMG_77]' }, { type: 'img', value: '[IMG_4096]' }, { type: 'img', value: '[IMG_819]' },
  { type: 'img', value: '[IMG_2048]' }, { type: 'img', value: '[IMG_333]' }, { type: 'img', value: '[IMG_1500]' },
  { type: 'img', value: '[IMG_99]' }, { type: 'img', value: '[IMG_2200]' }, { type: 'img', value: '[IMG_450]' },
  { type: 'img', value: '[IMG_3100]' }, { type: 'img', value: '[IMG_67]' }, { type: 'img', value: '[IMG_1800]' },
  { type: 'img', value: '[IMG_500]' }, { type: 'img', value: '[IMG_2500]' }, { type: 'img', value: '[IMG_750]' },
  { type: 'img', value: '[IMG_3500]' }, { type: 'img', value: '[IMG_123]' }, { type: 'img', value: '[IMG_1900]' },
  { type: 'img', value: '[IMG_600]' }, { type: 'img', value: '[IMG_2800]' }, { type: 'img', value: '[IMG_400]' },
  { type: 'ctrl', value: '<img_end>' },
  { type: 'text', value: '它' }, { type: 'text', value: '最' }, { type: 'text', value: '喜欢' },
  { type: 'text', value: '在' }, { type: 'text', value: '阳光' }, { type: 'text', value: '下' },
  { type: 'text', value: '的' }, { type: 'text', value: '草地' }, { type: 'text', value: '上' },
  { type: 'text', value: '打滚' }, { type: 'text', value: '。' },
];

const PHASES = {
  'text-1': '文本生成阶段',
  'ctrl-start': '触发画图模式',
  'img-stream': '图像 Token 流传输中',
  'ctrl-end': '图像 Token 结束',
  'decode': 'VQ-VAE 解码中',
  'text-2': '恢复文本生成',
  'done': '生成完成'
};

let currentStep = -1;
let isPlaying = false;
let playTimer = null;

const $ = id => document.getElementById(id);

function getTokenStyle(type) {
  if (type === 'text') return 'bg-blue-500/20 border-blue-500/40 text-blue-200';
  if (type === 'ctrl') return 'bg-purple-500/20 border-purple-500/40 text-purple-200 pulse-glow';
  return 'bg-green-500/20 border-green-500/40 text-green-200';
}

function getPhase(token, index) {
  if (token.type === 'text' && index < 10) return 'text-1';
  if (token.type === 'ctrl' && token.value === '<img_start>') return 'ctrl-start';
  if (token.type === 'img') return 'img-stream';
  if (token.type === 'ctrl' && token.value === '<img_end>') return 'ctrl-end';
  if (token.type === 'text' && index > 27) return 'text-2';
  return 'text-1';
}

function renderStep(step) {
  const tokenStream = $('token-stream');
  const textOutput = $('text-output');
  const imageBuffer = $('image-buffer');
  const finalOutput = $('final-output');
  const decodeStatus = $('decode-status');
  const routerStatus = $('router-status');

  let textTokens = 0, ctrlTokens = 0, imgTokens = 0;
  let textStr = '';
  let imgBufferCount = 0;
  let imgDecoded = false;
  let finalItems = [];

  for (let i = 0; i <= step && i < TOKENS.length; i++) {
    const t = TOKENS[i];
    if (t.type === 'text') { textTokens++; textStr += t.value; finalItems.push({ type: 'text', value: t.value }); }
    else if (t.type === 'ctrl') { ctrlTokens++; }
    else if (t.type === 'img') { imgTokens++; imgBufferCount++; }
  }

  if (step >= 27) { imgDecoded = true; finalItems.splice(10, 0, { type: 'image' }); }

  // Token stream
  tokenStream.innerHTML = '';
  for (let i = 0; i <= step && i < TOKENS.length; i++) {
    const t = TOKENS[i];
    const span = document.createElement('span');
    span.className = `inline-block px-2 py-0.5 rounded text-xs font-mono border token-enter ${getTokenStyle(t.type)}`;
    span.textContent = t.value;
    if (i === step) span.classList.add('ring-2', 'ring-white/30');
    tokenStream.appendChild(span);
  }

  // Stats
  $('text-count').textContent = textTokens;
  $('ctrl-count').textContent = ctrlTokens;
  $('img-count').textContent = imgTokens;

  // Phase
  const phase = step < 0 ? 'ready' : getPhase(TOKENS[Math.min(step, TOKENS.length - 1)], step);
  $('phase-label').textContent = PHASES[phase] || '就绪';

  // Router status
  if (step < 0) routerStatus.textContent = '等待生成开始...';
  else if (phase === 'text-1' || phase === 'text-2') routerStatus.textContent = '文本 Token → 文本解码器 → 流式输出';
  else if (phase === 'ctrl-start') routerStatus.textContent = '检测到 <img_start>，切换至图像模式';
  else if (phase === 'img-stream') routerStatus.textContent = `图像 Token → 缓冲区收集 (${imgBufferCount}/18)`;
  else if (phase === 'ctrl-end') routerStatus.textContent = '检测到 <img_end>，触发 VQ-VAE 解码';
  else if (phase === 'decode') routerStatus.textContent = 'VQ-VAE 解码完成，图像已渲染';
  else if (phase === 'done') routerStatus.textContent = '生成完成，所有内容已渲染';

  // Text output
  textOutput.innerHTML = textStr ? `<span class="slide-in">${textStr}</span><span class="inline-block w-0.5 h-4 bg-indigo-400 ml-0.5 animate-pulse align-middle"></span>` : '';

  // Image buffer
  if (step < 10) {
    imageBuffer.innerHTML = '<span class="text-gray-600 text-sm">等待图像 Token...</span>';
    decodeStatus.textContent = '';
  } else if (step < 27) {
    const pct = Math.round((imgBufferCount / 18) * 100);
    imageBuffer.innerHTML = `
      <div class="w-full">
        <div class="flex items-center justify-between mb-2">
          <span class="text-green-400 text-xs font-mono">收集图像 Token...</span>
          <span class="text-green-400 text-xs font-bold">${imgBufferCount} / 18</span>
        </div>
        <div class="w-full bg-gray-800 rounded-full h-2">
          <div class="bg-green-500 h-2 rounded-full transition-all duration-300" style="width: ${pct}%"></div>
        </div>
        <div class="mt-3 flex flex-wrap gap-1">
          ${TOKENS.slice(11, 11 + imgBufferCount).map(t => `<span class="text-[10px] font-mono text-green-400/60">${t.value}</span>`).join(' ')}
        </div>
      </div>`;
    decodeStatus.textContent = '';
  } else {
    imageBuffer.innerHTML = `
      <div class="decode-flash w-full flex flex-col items-center">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-green-400 text-xs">VQ-VAE 解码完成</span>
          <span class="text-green-500 text-xs">&#10003;</span>
        </div>
        <svg width="160" height="120" viewBox="0 0 160 120" class="rounded-lg">
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="100%" stop-color="#E0F0FF"/></linearGradient>
            <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
          </defs>
          <rect width="160" height="70" fill="url(#sky)"/>
          <rect y="70" width="160" height="50" fill="url(#grass)"/>
          <circle cx="130" cy="25" r="15" fill="#FFD700" opacity="0.9"/>
          <ellipse cx="80" cy="85" rx="25" ry="18" fill="#FF8C00"/>
          <ellipse cx="80" cy="72" rx="16" ry="14" fill="#FF8C00"/>
          <polygon points="68,64 72,52 76,64" fill="#FF8C00"/>
          <polygon points="84,64 88,52 92,64" fill="#FF8C00"/>
          <polygon points="69,62 73,54 75,62" fill="#FFB6C1"/>
          <polygon points="85,62 89,54 91,62" fill="#FFB6C1"/>
          <circle cx="75" cy="70" r="2.5" fill="#2E7D32"/><circle cx="85" cy="70" r="2.5" fill="#2E7D32"/>
          <circle cx="75.8" cy="69.3" r="0.8" fill="white"/><circle cx="85.8" cy="69.3" r="0.8" fill="white"/>
          <ellipse cx="80" cy="75" rx="2" ry="1.2" fill="#FF69B4"/>
          <line x1="66" y1="73" x2="56" y2="70" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="66" y1="75" x2="56" y2="75" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="66" y1="77" x2="56" y2="80" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="94" y1="73" x2="104" y2="70" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="94" y1="75" x2="104" y2="75" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="94" y1="77" x2="104" y2="80" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M95,90 Q110,85 105,95" stroke="#FF8C00" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>`;
    decodeStatus.textContent = '18 个图像 Token → VQ-VAE 解码 → 256x256 RGB 图像';
  }

  // Final output
  if (step < 0) {
    finalOutput.innerHTML = '<span class="text-gray-400 text-sm">等待生成完成...</span>';
  } else {
    let html = '';
    for (const item of finalItems) {
      if (item.type === 'text') {
        html += `<span>${item.value}</span>`;
      } else {
        html += `<div class="my-3 flex justify-center">
          <svg width="160" height="120" viewBox="0 0 160 120" class="rounded-lg border border-gray-200">
            <defs><linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="100%" stop-color="#E0F0FF"/></linearGradient><linearGradient id="grass2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient></defs>
            <rect width="160" height="70" fill="url(#sky2)"/><rect y="70" width="160" height="50" fill="url(#grass2)"/>
            <circle cx="130" cy="25" r="15" fill="#FFD700" opacity="0.9"/>
            <ellipse cx="80" cy="85" rx="25" ry="18" fill="#FF8C00"/><ellipse cx="80" cy="72" rx="16" ry="14" fill="#FF8C00"/>
            <polygon points="68,64 72,52 76,64" fill="#FF8C00"/><polygon points="84,64 88,52 92,64" fill="#FF8C00"/>
            <circle cx="75" cy="70" r="2.5" fill="#2E7D32"/><circle cx="85" cy="70" r="2.5" fill="#2E7D32"/>
            <ellipse cx="80" cy="75" rx="2" ry="1.2" fill="#FF69B4"/>
            <path d="M95,90 Q110,85 105,95" stroke="#FF8C00" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg></div>`;
      }
    }
    finalOutput.innerHTML = html;
  }

  // Progress
  const total = TOKENS.length;
  const pct = Math.round(((step + 1) / total) * 100);
  $('progress-bar').style.width = pct + '%';
  $('step-label').textContent = `步骤 ${step + 1} / ${total}`;

  // Button states
  $('btn-prev').disabled = step <= -1;
  $('btn-next').disabled = step >= total - 1;
}

function nextStep() {
  if (currentStep < TOKENS.length - 1) { currentStep++; renderStep(currentStep); }
  else { stopPlay(); }
}

function prevStep() {
  if (currentStep > -1) { currentStep--; renderStep(currentStep); }
}

function resetSim() {
  stopPlay();
  currentStep = -1;
  $('token-stream').innerHTML = '';
  $('text-output').innerHTML = '';
  $('image-buffer').innerHTML = '<span class="text-gray-600 text-sm">等待图像 Token...</span>';
  $('final-output').innerHTML = '<span class="text-gray-400 text-sm">等待生成完成...</span>';
  $('decode-status').textContent = '';
  $('router-status').textContent = '等待生成开始...';
  $('text-count').textContent = '0';
  $('ctrl-count').textContent = '0';
  $('img-count').textContent = '0';
  $('progress-bar').style.width = '0%';
  $('step-label').textContent = '步骤 0 / ' + TOKENS.length;
  $('phase-label').textContent = '就绪';
  $('btn-prev').disabled = true;
  $('btn-next').disabled = false;
}

function stopPlay() {
  isPlaying = false;
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  $('btn-play').textContent = '自动播放';
  $('btn-play').classList.remove('bg-red-600', 'hover:bg-red-500');
  $('btn-play').classList.add('bg-emerald-600', 'hover:bg-emerald-500');
}

function startPlay() {
  isPlaying = true;
  $('btn-play').textContent = '暂停';
  $('btn-play').classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
  $('btn-play').classList.add('bg-red-600', 'hover:bg-red-500');
  function tick() {
    if (!isPlaying) return;
    if (currentStep >= TOKENS.length - 1) { stopPlay(); return; }
    nextStep();
    const speed = parseInt($('speed-select').value);
    playTimer = setTimeout(tick, speed);
  }
  tick();
}

$('btn-next').addEventListener('click', nextStep);
$('btn-prev').addEventListener('click', prevStep);
$('btn-play').addEventListener('click', () => { isPlaying ? stopPlay() : startPlay(); });
$('btn-reset').addEventListener('click', resetSim);

resetSim();
</script>
</body>
</html>
