<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #faf8ef;
      color: #776e65;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      width: 100%;
      max-width: 460px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .title {
      font-size: 64px;
      font-weight: 800;
      color: #776e65;
      line-height: 1;
    }

    .scores {
      display: flex;
      gap: 8px;
    }

    .score-box {
      background: #bbada0;
      border-radius: 6px;
      padding: 8px 20px;
      text-align: center;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 11px;
      font-weight: 600;
      color: #eee4da;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .controls {
      width: 100%;
      max-width: 460px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 14px;
      color: #776e65;
      line-height: 1.4;
    }

    .subtitle strong { color: #776e65; }

    .btn {
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #9f8b77; }
    .btn:active { transform: scale(0.97); }

    .board-container {
      position: relative;
      width: 100%;
      max-width: 460px;
    }

    .board {
      background: #bbada0;
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      aspect-ratio: 1;
      position: relative;
    }

    .cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
    }

    .tiles-layer {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: 800;
      transition: top 0.12s ease, left 0.12s ease;
      z-index: 1;
    }

    .tile.new {
      animation: appear 0.2s ease;
    }

    .tile.merged {
      animation: pop 0.2s ease;
      z-index: 2;
    }

    @keyframes appear {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 80%; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 80%; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 80%; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 65%; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 65%; }
    .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 50%; }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(238, 228, 218, 0.73);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay.win { background: rgba(237, 194, 46, 0.5); }

    .overlay-text {
      font-size: 48px;
      font-weight: 800;
      color: #776e65;
      margin-bottom: 16px;
    }

    .overlay.win .overlay-text { color: #f9f6f2; }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #9e948a;
      max-width: 460px;
      line-height: 1.6;
    }

    .footer a { color: #776e65; text-decoration: underline; }

    @media (max-width: 500px) {
      .title { font-size: 48px; }
      .board { padding: 8px; gap: 8px; }
      .score-box { padding: 6px 12px; min-width: 64px; }
      .score-box .value { font-size: 18px; }
      .overlay-text { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">最高</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="subtitle">合并数字，到达 <strong>2048</strong>！</div>
    <button class="btn" id="newGameBtn">新游戏</button>
  </div>

  <div class="board-container">
    <div class="board" id="board">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="tiles-layer" id="tilesLayer"></div>
    </div>
    <div class="overlay" id="overlay">
      <div class="overlay-text" id="overlayText">游戏结束!</div>
      <button class="btn" id="overlayBtn">再来一局</button>
    </div>
  </div>

  <div class="footer">
    <strong>操作方式：</strong>键盘方向键 / 触屏滑动<br>
    灵感来自 <a href="https://play2048.co" target="_blank">play2048.co</a>
  </div>

  <script>
    const SIZE = 4;
    let grid, score, best, won, over, moving;

    const $score = document.getElementById('score');
    const $best = document.getElementById('best');
    const $board = document.getElementById('board');
    const $tiles = document.getElementById('tilesLayer');
    const $overlay = document.getElementById('overlay');
    const $overlayText = document.getElementById('overlayText');
    const $overlayBtn = document.getElementById('overlayBtn');
    const $newGameBtn = document.getElementById('newGameBtn');

    best = parseInt(localStorage.getItem('best2048') || '0');
    $best.textContent = best;

    function init() {
      grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      score = 0;
      won = false;
      over = false;
      moving = false;
      $score.textContent = '0';
      $overlay.classList.remove('active', 'win');
      addRandom();
      addRandom();
      render();
    }

    function addRandom() {
      const empty = [];
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] === 0) empty.push([r, c]);
      if (empty.length === 0) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      return [r, c];
    }

    function tileClass(v) {
      if (v <= 2048) return `tile-${v}`;
      return 'tile-super';
    }

    function render(newTile, mergedTiles) {
      $tiles.innerHTML = '';
      const cellSize = 100 / SIZE;
      
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const v = grid[r][c];
          if (v === 0) continue;
          
          const tile = document.createElement('div');
          tile.className = `tile ${tileClass(v)}`;
          
          const isNew = newTile && newTile[0] === r && newTile[1] === c;
          const isMerged = mergedTiles && mergedTiles.some(t => t[0] === r && t[1] === c);
          
          if (isNew) tile.classList.add('new');
          if (isMerged) tile.classList.add('merged');

          const fontSize = v < 100 ? '36px' : v < 1000 ? '28px' : v < 10000 ? '22px' : '18px';
          
          tile.style.cssText = `
            width: calc(${cellSize}% - ${SIZE > 1 ? (10 - 10/SIZE) : 0}px);
            height: calc(${cellSize}% - ${SIZE > 1 ? (10 - 10/SIZE) : 0}px);
            top: calc(${r * cellSize}% + ${r > 0 ? r * 10 / SIZE : 0}px);
            left: calc(${c * cellSize}% + ${c > 0 ? c * 10 / SIZE : 0}px);
            font-size: ${fontSize};
          `;
          tile.textContent = v;
          $tiles.appendChild(tile);
        }
      }
    }

    function slide(row) {
      let arr = row.filter(v => v !== 0);
      const merged = [];
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2;
          score += arr[i];
          merged.push(i);
          arr[i + 1] = 0;
        }
      }
      arr = arr.filter(v => v !== 0);
      while (arr.length < SIZE) arr.push(0);
      return { result: arr, merged };
    }

    function move(dir) {
      if (moving || over) return;
      
      let moved = false;
      const mergedPositions = [];
      
      const getRow = (i, dir) => {
        switch (dir) {
          case 'left': return grid[i].slice();
          case 'right': return grid[i].slice().reverse();
          case 'up': return grid.map(r => r[i]);
          case 'down': return grid.map(r => r[i]).reverse();
        }
      };

      const setRow = (i, row, dir) => {
        switch (dir) {
          case 'left':
            grid[i] = row;
            break;
          case 'right':
            grid[i] = row.reverse();
            break;
          case 'up':
            row.forEach((v, r) => grid[r][i] = v);
            break;
          case 'down':
            row.reverse().forEach((v, r) => grid[r][i] = v);
            break;
        }
      };

      for (let i = 0; i < SIZE; i++) {
        const orig = getRow(i, dir);
        const { result, merged } = slide(orig);
        
        if (result.some((v, j) => v !== orig[j])) moved = true;
        
        setRow(i, result, dir);
        
        merged.forEach(idx => {
          let r, c;
          switch (dir) {
            case 'left': r = i; c = idx; break;
            case 'right': r = i; c = SIZE - 1 - idx; break;
            case 'up': r = idx; c = i; break;
            case 'down': r = SIZE - 1 - idx; c = i; break;
          }
          mergedPositions.push([r, c]);
        });
      }

      if (moved) {
        moving = true;
        const newTile = addRandom();
        $score.textContent = score;
        if (score > best) {
          best = score;
          $best.textContent = best;
          localStorage.setItem('best2048', best);
        }
        render(newTile, mergedPositions);
        
        setTimeout(() => {
          moving = false;
          if (grid.flat().includes(2048) && !won) {
            won = true;
            showOverlay('你赢了!', true);
          } else if (isGameOver()) {
            over = true;
            showOverlay('游戏结束!', false);
          }
        }, 150);
      }
    }

    function isGameOver() {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) return false;
          if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
          if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
        }
      return true;
    }

    function showOverlay(text, isWin) {
      $overlayText.textContent = text;
      $overlay.classList.add('active');
      if (isWin) $overlay.classList.add('win');
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
      if (map[e.key]) {
        e.preventDefault();
        move(map[e.key]);
      }
    });

    // Touch / Swipe
    let touchStartX, touchStartY;
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (touchStartX === undefined) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      
      if (Math.max(absDx, absDy) < 30) return;
      
      if (absDx > absDy) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
      touchStartX = undefined;
    }, { passive: true });

    // Buttons
    $newGameBtn.addEventListener('click', init);
    $overlayBtn.addEventListener('click', init);

    // Start
    init();
  </script>
</body>
</html>
