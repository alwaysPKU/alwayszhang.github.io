<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 性格测试 - 发现你的性格类型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #222240;
  --text: #e8e8f0;
  --text-muted: #8888a0;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.3);
  --border: #2a2a4a;
  --success: #10b981;
  --warning: #f59e0b;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Welcome Screen */
.welcome {
  text-align: center;
  padding: 40px 20px;
}

.welcome h1 {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}

.welcome p {
  color: var(--text-muted);
  font-size: 1.1rem;
  margin-bottom: 32px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.dimensions-preview {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 40px;
}

.dim-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}

.dim-card .dim-icon {
  font-size: 2rem;
  margin-bottom: 8px;
}

.dim-card .dim-title {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 4px;
}

.dim-card .dim-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.start-btn {
  background: linear-gradient(135deg, #6366f1, #a855f7);
  color: white;
  border: none;
  padding: 16px 48px;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px var(--accent-glow);
}

.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.test-info {
  margin-top: 24px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Question Screen */
.question-screen {
  display: none;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #a855f7);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-text {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 32px;
}

.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 24px;
  margin-bottom: 20px;
}

.question-text {
  font-size: 1.2rem;
  font-weight: 600;
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.5;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option-btn {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.option-btn:hover {
  border-color: var(--accent);
  background: rgba(99, 102, 241, 0.1);
}

.option-btn.selected {
  border-color: var(--accent);
  background: rgba(99, 102, 241, 0.15);
  box-shadow: 0 0 12px var(--accent-glow);
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.nav-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.2s;
}

.nav-btn:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}

.nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Result Screen */
.result-screen {
  display: none;
  text-align: center;
  padding: 20px;
}

.result-header {
  margin-bottom: 32px;
}

.result-type {
  font-size: 4rem;
  font-weight: 900;
  letter-spacing: 8px;
  margin-bottom: 8px;
}

.result-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.result-subtitle {
  color: var(--text-muted);
  font-size: 1rem;
}

.dimension-bars {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 32px;
}

.dim-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
}

.dim-bar-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 0.9rem;
}

.dim-bar-labels .active {
  font-weight: 700;
  color: var(--accent);
}

.dim-bar-track {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}

.dim-bar-fill.left {
  background: linear-gradient(90deg, #6366f1, #818cf8);
}

.dim-bar-fill.right {
  background: linear-gradient(90deg, #a855f7, #c084fc);
  float: right;
}

.dim-bar-pct {
  text-align: right;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.description-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
  text-align: left;
}

.description-card h3 {
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: var(--accent);
}

.description-card p {
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 12px;
}

.traits-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.trait-tag {
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.85rem;
  text-align: center;
}

.famous-people {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.famous-tag {
  background: rgba(168, 85, 247, 0.1);
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.85rem;
}

.action-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.action-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 14px 28px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
}

.action-btn:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}

.action-btn.primary {
  background: linear-gradient(135deg, #6366f1, #a855f7);
  border: none;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeIn 0.5s ease forwards;
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

.scale-in {
  animation: scaleIn 0.6s ease forwards;
}

/* Responsive */
@media (max-width: 600px) {
  .welcome h1 { font-size: 1.8rem; }
  .dimensions-preview { grid-template-columns: 1fr; }
  .result-type { font-size: 3rem; }
  .traits-grid { grid-template-columns: 1fr; }
  .question-text { font-size: 1.05rem; }
}
</style>
</head>

let currentQuestion = 0;
let answers = new Array(questions.length).fill(null);

function startTest() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  showQuestion(0);
}

function showQuestion(index) {
  currentQuestion = index;
  const q = questions[index];
  
  document.getElementById('progressFill').style.width = `${((index + 1) / questions.length) * 100}%`;
  document.getElementById('progressText').textContent = `第 ${index + 1} / ${questions.length} 题`;
  document.getElementById('questionText').textContent = q.text;
  
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[index] === i ? ' selected' : '');
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(index, i);
    container.appendChild(btn);
  });
  
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').textContent = index === questions.length - 1 ? '查看结果 →' : '下一题 →';
  
  // Animate
  document.getElementById('questionCard').classList.remove('fade-in');
  void document.getElementById('questionCard').offsetWidth;
  document.getElementById('questionCard').classList.add('fade-in');
}

function selectOption(qIndex, optIndex) {
  answers[qIndex] = optIndex;
  
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === optIndex);
  });
  
  // Auto advance after short delay
  setTimeout(() => {
    if (currentQuestion < questions.length - 1) {
      showQuestion(currentQuestion + 1);
    }
  }, 300);
}

function prevQuestion() {
  if (currentQuestion > 0) {
    showQuestion(currentQuestion - 1);
  }
}

function nextQuestion() {
  if (answers[currentQuestion] === null) {
    // Highlight that selection is needed
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.style.borderColor = '#ef4444';
      setTimeout(() => btn.style.borderColor = '', 500);
    });
    return;
  }
  
  if (currentQuestion < questions.length - 1) {
    showQuestion(currentQuestion + 1);
  } else {
    showResult();
  }
}

function calculateResult() {
  const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  
  answers.forEach((ansIndex, qIndex) => {
    if (ansIndex !== null) {
      const q = questions[qIndex];
      const value = q.options[ansIndex].value;
      scores[value]++;
    }
  });
  
  const type = 
    (scores.E >= scores.I ? 'E' : 'I') +
    (scores.S >= scores.N ? 'S' : 'N') +
    (scores.T >= scores.F ? 'T' : 'F') +
    (scores.J >= scores.P ? 'J' : 'P');
  
  const percentages = {
    EI: { left: scores.E, right: scores.I, total: scores.E + scores.I },
    SN: { left: scores.S, right: scores.N, total: scores.S + scores.N },
    TF: { left: scores.T, right: scores.F, total: scores.T + scores.F },
    JP: { left: scores.J, right: scores.P, total: scores.J + scores.P }
  };
  
  return { type, scores, percentages };
}

function showResult() {
  const { type, scores, percentages } = calculateResult();
  const data = personalityTypes[type];
  
  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  
  const dimLabels = [
    { key: 'EI', left: 'E 外向', right: 'I 内向', leftVal: percentages.EI.left, rightVal: percentages.EI.right, total: percentages.EI.total },
    { key: 'SN', left: 'S 感觉', right: 'N 直觉', leftVal: percentages.SN.left, rightVal: percentages.SN.right, total: percentages.SN.total },
    { key: 'TF', left: 'T 思考', right: 'F 情感', leftVal: percentages.TF.left, rightVal: percentages.TF.right, total: percentages.TF.total },
    { key: 'JP', left: 'J 判断', right: 'P 感知', leftVal: percentages.JP.left, rightVal: percentages.JP.right, total: percentages.JP.total }
  ];
  
  let barsHTML = dimLabels.map(d => {
    const leftPct = Math.round((d.leftVal / d.total) * 100);
    const rightPct = 100 - leftPct;
    const leftActive = d.leftVal >= d.rightVal;
    return `
      <div class="dim-bar">
        <div class="dim-bar-labels">
          <span class="${leftActive ? 'active' : ''}">${d.left}</span>
          <span class="${!leftActive ? 'active' : ''}">${d.right}</span>
        </div>
        <div class="dim-bar-track">
          <div class="dim-bar-fill ${leftActive ? 'left' : 'right'}" style="width: ${leftActive ? leftPct : rightPct}%"></div>
        </div>
        <div class="dim-bar-pct">${leftActive ? leftPct : rightPct}%</div>
      </div>
    `;
  }).join('');
  
  let traitsHTML = data.traits.map(t => `<div class="trait-tag">${t}</div>`).join('');
  let famousHTML = data.famous.map(f => `<div class="famous-tag">${f}</div>`).join('');
  
  document.getElementById('resultScreen').innerHTML = `
    <div class="result-header scale-in">
      <div class="result-type" style="color: ${data.color}">${type}</div>
      <div class="result-title">${data.title}</div>
      <div class="result-subtitle">${data.subtitle}</div>
    </div>
    
    <div class="dimension-bars fade-in">
      ${barsHTML}
    </div>
    
    <div class="description-card fade-in">
      <h3>性格描述</h3>
      <p>${data.desc}</p>
    </div>
    
    <div class="description-card fade-in">
      <h3>核心特质</h3>
      <div class="traits-grid">${traitsHTML}</div>
    </div>
    
    <div class="description-card fade-in">
      <h3>代表人物</h3>
      <div class="famous-people">${famousHTML}</div>
    </div>
    
    <div class="action-buttons fade-in">
      <button class="action-btn primary" onclick="restartTest()">重新测试</button>
      <button class="action-btn" onclick="shareResult('${type}', '${data.title}')">分享结果</button>
    </div>
  `;
}

function restartTest() {
  answers = new Array(questions.length).fill(null);
  currentQuestion = 0;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('welcome').style.display = 'block';
}

function shareResult(type, title) {
  const text = `我的 MBTI 性格类型是 ${type} - ${title}！快来测测你是什么类型 👉`;
  if (navigator.share) {
    navigator.share({ title: 'MBTI 性格测试结果', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('已复制到剪贴板，快去分享吧！');
    });
  }
}
