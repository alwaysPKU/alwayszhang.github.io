<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;user-select:none}
h1{font-size:2rem;margin-bottom:1rem;background:linear-gradient(90deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.info{display:flex;gap:2rem;margin-bottom:1rem;font-size:1.1rem}
.info span{background:rgba(255,255,255,0.1);padding:0.5rem 1rem;border-radius:8px}
canvas{border:2px solid #00ff88;border-radius:8px;box-shadow:0 0 30px rgba(0,255,136,0.3);background:#0a0a1a}
.controls{margin-top:1rem;display:flex;gap:1rem}
button{padding:0.7rem 1.5rem;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:all 0.2s}
.btn-start{background:linear-gradient(135deg,#00ff88,#00d4ff);color:#1a1a2e;font-weight:bold}
.btn-start:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,255,136,0.5)}
.hint{margin-top:1rem;opacity:0.6;font-size:0.9rem}
.game-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);padding:2rem;border-radius:16px;text-align:center;display:none;border:2px solid #ff4444}
.game-over h2{color:#ff4444;margin-bottom:1rem}
.mobile-controls{display:none;margin-top:1rem;gap:0.5rem}
.mobile-controls button{width:60px;height:60px;font-size:1.5rem;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
@media(max-width:600px){.mobile-controls{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px)}}
</style>
</head>
<body>
<h1>🐍 贪吃蛇</h1>
<div class="info"><span>分数: <b id="score">0</b></span><span>最高: <b id="best">0</b></span></div>
<div style="position:relative">
<canvas id="game" width="400" height="400"></canvas>
<div class="game-over" id="gameOver"><h2>游戏结束</h2><p>得分: <span id="finalScore">0</span></p><button class="btn-start" onclick="startGame()" style="margin-top:1rem">再来一局</button></div>
</div>
<div class="controls"><button class="btn-start" id="startBtn" onclick="startGame()">开始游戏</button></div>
<div class="mobile-controls"><div></div><button onclick="setDir(0,-1)">↑</button><div></div><button onclick="setDir(-1,0)">←</button><button onclick="setDir(0,1)">↓</button><button onclick="setDir(1,0)">→</button></div>
<p class="hint">方向键 / WASD 控制方向</p>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const GRID=20,COLS=canvas.width/GRID,ROWS=canvas.height/GRID;
let snake,food,dir,nextDir,score,best=+localStorage.getItem('snakeBest')||0,gameLoop,running=false;
document.getElementById('best').textContent=best;
function startGame(){snake=[{x:10,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;updateScore();placeFood();running=true;document.getElementById('gameOver').style.display='none';if(gameLoop)clearInterval(gameLoop);gameLoop=setInterval(update,100)}
function placeFood(){do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}while(snake.some(s=>s.x===food.x&&s.y===food.y))}
function setDir(x,y){if(dir.x===-x&&dir.y===-y)return;nextDir={x,y}}
function update(){dir=nextDir;const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;updateScore();placeFood()}else snake.pop();draw()}
function draw(){ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#ff4444';ctx.shadowColor='#ff4444';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(food.x*GRID+GRID/2,food.y*GRID+GRID/2,GRID/2-2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;snake.forEach((s,i)=>{const g=ctx.createRadialGradient(s.x*GRID+GRID/2,s.y*GRID+GRID/2,0,s.x*GRID+GRID/2,s.y*GRID+GRID/2,GRID/2);g.addColorStop(0,i===0?'#00ff88':'#00d4ff');g.addColorStop(1,i===0?'#00aa55':'#0088aa');ctx.fillStyle=g;ctx.fillRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2)})}
function updateScore(){document.getElementById('score').textContent=score;if(score>best){best=score;localStorage.setItem('snakeBest',best);document.getElementById('best').textContent=best}}
function gameOver(){running=false;clearInterval(gameLoop);document.getElementById('finalScore').textContent=score;document.getElementById('gameOver').style.display='block'}
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowup'||k==='w')setDir(0,-1);else if(k==='arrowdown'||k==='s')setDir(0,1);else if(k==='arrowleft'||k==='a')setDir(-1,0);else if(k==='arrowright'||k==='d')setDir(1,0)});
draw=draw;ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>
