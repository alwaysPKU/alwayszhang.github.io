<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆翻牌</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
h1{font-size:2rem;margin-bottom:1rem}
.info{display:flex;gap:2rem;margin-bottom:1.5rem}
.info span{background:rgba(255,255,255,0.1);padding:0.5rem 1rem;border-radius:8px}
.grid{display:grid;gap:10px;perspective:1000px}
.card{width:80px;height:80px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform 0.5s}
.card.flipped{transform:rotateY(180deg)}
.card.matched{animation:match 0.5s}
@keyframes match{0%,100%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.1)}}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem}
.back{background:linear-gradient(135deg,#667eea,#764ba2)}
.front{background:#fff;transform:rotateY(180deg);font-size:2.5rem}
.controls{margin-top:1.5rem;display:flex;gap:1rem}
button{padding:0.7rem 1.5rem;border:none;border-radius:8px;font-size:1rem;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:bold;transition:all 0.2s}
button:hover{transform:scale(1.05)}
.diff{display:flex;gap:0.5rem;margin-bottom:1rem}
.diff button{padding:0.5rem 1rem;font-size:0.9rem}
.diff button.active{background:linear-gradient(135deg,#f093fb,#f5576c)}
.win{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);padding:2rem;border-radius:16px;text-align:center;display:none;border:2px solid #feca57}
.win h2{color:#feca57;margin-bottom:1rem}
</style>
</head>
<body>
<h1>🃏 记忆翻牌</h1>
<div class="diff"><button class="active" onclick="setDiff(4)">4x4</button><button onclick="setDiff(6)">6x6</button></div>
<div class="info"><span>步数: <b id="moves">0</b></span><span>配对: <b id="pairs">0</b></span><span>时间: <b id="time">0</b>s</span></div>
<div style="position:relative"><div class="grid" id="grid"></div>
<div class="win" id="winMsg"><h2>🎉 完成!</h2><p>用了 <span id="finalMoves">0</span> 步，<span id="finalTime">0</span> 秒</p><button onclick="init()" style="margin-top:1rem">再来一局</button></div>
</div>
<div class="controls"><button onclick="init()">重新开始</button></div>
<script>
const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦'];
let size=4,cards,flipped,matched,moves,timer,seconds;
function setDiff(s){size=s;document.querySelectorAll('.diff button').forEach(b=>b.classList.toggle('active',b.textContent.includes(s===4?'4':'6')));init()}
function init(){const grid=document.getElementById('grid');const count=size*size;const emojis=EMOJIS.slice(0,count/2);const deck=[...emojis,...emojis].sort(()=>Math.random()-0.5);cards=deck;flipped=[];matched=new Set();moves=0;seconds=0;if(timer)clearInterval(timer);timer=setInterval(()=>{seconds++;document.getElementById('time').textContent=seconds},1000);document.getElementById('moves').textContent=0;document.getElementById('pairs').textContent=0;document.getElementById('winMsg').style.display='none';grid.style.gridTemplateColumns=`repeat(${size},80px)`;grid.innerHTML=deck.map((e,i)=>`<div class="card" onclick="flip(${i})"><div class="back">?</div><div class="front">${e}</div></div>`).join('')}
function flip(i){if(flipped.length===2||flipped.includes(i)||matched.has(i))return;const card=document.querySelectorAll('.card')[i];card.classList.add('flipped');flipped.push(i);if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;const[a,b]=flipped;if(cards[a]===cards[b]){matched.add(a);matched.add(b);document.querySelectorAll('.card')[a].classList.add('matched');document.querySelectorAll('.card')[b].classList.add('matched');document.getElementById('pairs').textContent=matched.size/2;flipped=[];if(matched.size===cards.length){clearInterval(timer);document.getElementById('finalMoves').textContent=moves;document.getElementById('finalTime').textContent=seconds;document.getElementById('winMsg').style.display='block'}}else setTimeout(()=>{document.querySelectorAll('.card')[a].classList.remove('flipped');document.querySelectorAll('.card')[b].classList.remove('flipped');flipped=[]},800)}}
init();
</script>
</body>
</html>
